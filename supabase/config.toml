# SVI Supabase config (resumido — extender al crear el proyecto real)
project_id = "svi-erp"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "http://localhost:3001/**",
]
jwt_expiry = 3600
enable_signup = false  # solo invitados / portal con activación manual

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

# Hook que inyecta empresa_id, rol y sucursales[] en el JWT (ver §8.3 del plan)
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
enabled = true
inspector_port = 8083
