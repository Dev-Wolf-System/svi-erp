# ============================================================================
# SVI ERP/CRM — Stack de producción para VPS con Traefik
# ============================================================================
# - svi-web   (landing + portal cliente/inversor) → ${WEB_HOST}
# - svi-admin (sistema interno / ERP)             → ${ADMIN_HOST}
#
# Hosts provisionales (hasta adquirir dominio propio):
#   WEB_HOST=svi.srv878399.hstgr.cloud
#   ADMIN_HOST=svi-erp.srv878399.hstgr.cloud
#
# Cuando se adquiera el dominio definitivo, basta con cambiar esos dos valores
# en .env.production (y los Redirect URLs en Supabase) — nada más toca.
#
# Redes externas (deben existir en el VPS antes de levantar):
#   docker network create n8n_evoapi      # Traefik + n8n + evolution-api
#   docker network create supabase_network # Supabase self-hosted
#
# Levantar:
#   docker compose --env-file .env.production up -d --build
# ============================================================================

services:
  svi-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_URL=https://${WEB_HOST}
        - NEXT_PUBLIC_ADMIN_URL=https://${ADMIN_HOST}
        - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
        - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST}
    container_name: svi-web
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # REQUERIDO desde F5.6 — el portal del inversor consulta con
      # service_role y filtro explícito por inversor_id (no usa RLS de admin).
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_APP_URL=https://${WEB_HOST}
      - NEXT_PUBLIC_ADMIN_URL=https://${ADMIN_HOST}
      - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
      - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST}
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_evoapi
      - traefik.http.services.svi-web.loadbalancer.server.port=3000
      - traefik.http.routers.svi-web.rule=Host(`${WEB_HOST}`)
      - traefik.http.routers.svi-web.tls=true
      - traefik.http.routers.svi-web.entrypoints=web,websecure
      - traefik.http.routers.svi-web.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.svi-web-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.svi-web-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.svi-web-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.svi-web-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.routers.svi-web.middlewares=svi-web-headers@docker
    networks:
      - n8n_evoapi
      - supabase_network

  svi-admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_URL=https://${WEB_HOST}
        - NEXT_PUBLIC_ADMIN_URL=https://${ADMIN_HOST}
        - NEXT_PUBLIC_AFIP_DRIVER=${AFIP_DRIVER}
    container_name: svi-admin
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Supabase
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # URLs
      - NEXT_PUBLIC_APP_URL=https://${WEB_HOST}
      - NEXT_PUBLIC_ADMIN_URL=https://${ADMIN_HOST}
      # AFIP — driver intercambiable (stub | sandbox | production)
      - AFIP_DRIVER=${AFIP_DRIVER}
      - AFIP_CUIT=${AFIP_CUIT}
      - AFIP_PUNTO_VENTA=${AFIP_PUNTO_VENTA}
      - AFIP_CERT=${AFIP_CERT}
      - AFIP_KEY=${AFIP_KEY}
      # Mercado Pago — cobro de señas online
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
      - MP_PUBLIC_KEY=${MP_PUBLIC_KEY}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}
      # Comunicaciones
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      # WhatsApp Business (Evolution API — futuro)
      - WHATSAPP_API_URL=${WHATSAPP_API_URL}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - WHATSAPP_INSTANCE_ID=${WHATSAPP_INSTANCE_ID}
      # IA y observabilidad
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_evoapi
      - traefik.http.services.svi-admin.loadbalancer.server.port=3001
      - traefik.http.routers.svi-admin.rule=Host(`${ADMIN_HOST}`)
      - traefik.http.routers.svi-admin.tls=true
      - traefik.http.routers.svi-admin.entrypoints=web,websecure
      - traefik.http.routers.svi-admin.tls.certresolver=mytlschallenge
      # Headers más estrictos en panel privado
      - traefik.http.middlewares.svi-admin-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.svi-admin-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.svi-admin-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.svi-admin-headers.headers.frameDeny=true
      - traefik.http.middlewares.svi-admin-headers.headers.referrerPolicy=no-referrer
      - traefik.http.routers.svi-admin.middlewares=svi-admin-headers@docker
    networks:
      - n8n_evoapi
      - supabase_network

networks:
  n8n_evoapi:
    external: true
  supabase_network:
    external: true
